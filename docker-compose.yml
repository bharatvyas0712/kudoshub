services:
  mysql:
    image: mysql:8.4
    container_name: kudoshub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: kudoshub
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: kudoshub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: mysql://root:password@mysql:3306/kudoshub
      CORS_ORIGIN: http://localhost:8080
      UPLOAD_DIR: uploads
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: kudoshub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql-data:
  uploads-data: